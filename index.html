<body class="m-0 p-0 relative dark:bg-[#222] dark:text-white">
  <header class="sticky top-0 left-0 w-full z-10 shadow dark:!bg-[#333] dark:text-white">
    <div class="container max-w-screen-sm mx-auto py-4 text-xl text-center">
      <span data-hover="current status" class="relative inline-block px-3 py-1 bg-black text-white">current status: </span>
    </div>
  </header>
  <main class="relative">
    <section class="container max-w-screen-sm mx-auto border-l border-r border-b border-gray-300 dark:!border-[#444]">
      <div class="h-48 bg-gray-300 overflow-hidden">
        <img class="w-full h-full object-cover" src="assets/img/header.jpg" alt="Oil pumpjacks operating across a flat, arid Texas landscape beneath a cloudy sky">
      </div>
      <div class="px-4 pb-6">
        <div class="-mt-12 mb-4 flex justify-between items-start">
          <img class="w-28 h-28 rounded-full outline outline-4 outline-white bg-black object-cover" src="assets/img/profile.jpg" alt="Maxx Crawford">
          <a class="mt-16 px-6 py-2 rounded-full border border-gray-400 font-bold text-black active:hover:bg-gray-800 hover:bg-gray-800 hover:text-white dark:text-white dark:hover:bg-gray-200 dark:hover:text-black" href="/rss.xml">Follow</a>
        </div>
        <div class="mb-6">
          <h1 class="text-3xl font-bold leading-tight">Maxx Crawford</h1>
          <a class="opacity-75" rel="me" href="https://mastodon.social/@woodenwarship">@woodenwarship</a>
          <div class="mt-2 opacity-75"><span id="postCount"></span> posts</div>
        </div>
        <div class="mb-4 text-lg leading-snug">
          <!-- <p><a class="text-blue-500" href="https://www.mozilla.org">@mozilla</a> senior ui engineer wfh</p>
          <p><a class="text-blue-500" href="https://tulsaux.com">@tulsaux</a> organizer</p>
          <p><a class="text-blue-500" href="https://www.techlahoma.org">@techlahoma</a> board member</p> -->
          <p><a class="text-blue-500" href="https://bsky.app/profile/maxx.social">bluesky: @maxx.social</a></p>
          <p><a class="text-blue-500" href="https://mastodon.social/@woodenwarship">mastodon.social: @woodenwarship</a></p>
          <p class="opacity-75">climbing rocks in my spare time</p>
          <!-- <p><a class="text-blue-500" href="https://blacklivesmatter.com">#blacklivesmatter</a></p> -->
        </div>
        <div class="mb-4 flex flex-wrap gap-x-4 gap-y-2">
          <span class=""><i class="fa-regular fa-location-dot" aria-hidden="true"></i> Tulsa, OK</span>
          <a class="text-blue-500" href="https://maxxcrawford.com"><i class="fa-regular fa-link" aria-hidden="true"></i> maxxcrawford.com</a>
          <!-- <a class="text-blue-500" rel="me" href="https://mastodon.social/@woodenwarship">mastodon.social/@woodenwarship</a> -->
          <p><i class="fa-regular fa-calendar" aria-hidden="true"></i> Joined Feb 2014 <span class="line-through">June 2009</span></p>
        </div>
        <div class="hidden flex gap-6">
          <span><strong>850</strong> Following</span>
          <span><strong>502</strong> Followers</span>
        </div>
      </div>
    </section>
    <ul class="feed container max-w-screen-sm mx-auto pb-16 dark:!border-[#444] dark:!border-x-2" >
      <li class="post dark:!border-[#444] dark:!border-b-2"></li>
    </ul>
  </main>
  <footer class="hidden dark:!bg-[#333]">
    <div class="container bg-none mx-auto py-4 text-gray-400 text-center text-sm">
